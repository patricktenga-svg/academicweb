name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "_sass/**"
      - "_scripts/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true # Manual install below to fix lockfile mismatch

      - name: Cache Jekyll 💾
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: ${{ runner.os }}-jekyll-${{ hashFiles('Gemfile.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-jekyll-${{ hashFiles('Gemfile.lock') }}-
            ${{ runner.os }}-jekyll-

      - name: Install and Build 🔧
        run: |
          # Fix the "frozen" error by allowing the lockfile to update
          bundle config set --local frozen false
          bundle install
                    
          # Build the site
          export JEKYLL_ENV=production
          bundle exec jekyll build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site  # Ensure this matches your Jekyll destination

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4